<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周刊素材库</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .search-box { background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .search-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
    .search-box input:focus { outline: none; border-color: #667eea; }
    .filters { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; }
    .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .stats { text-align: center; color: #666; font-size: 14px; margin-bottom: 15px; }
    .article { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .article h3 { font-size: 16px; margin-bottom: 8px; color: #333; }
    .article .meta { color: #999; font-size: 12px; margin-bottom: 8px; }
    .article .summary { font-size: 14px; line-height: 1.6; color: #555; margin-bottom: 10px; }
    .article .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: #f0f0f0; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: #666; }
    .article .quote { background: #fff9e6; border-left: 3px solid #ffc107; padding: 10px; margin: 10px 0; font-size: 13px; color: #666; font-style: italic; }
    .no-results { text-align: center; padding: 40px; color: #999; }
    @media (max-width: 600px) {
      .header h1 { font-size: 20px; }
      .container { padding: 10px; }
      .article h3 { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 周刊素材库</h1>
    <p>357篇精选文章 · 随时随地查阅</p>
  </div>
  <div class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索文章标题、摘要、标签...">
    </div>
    <div class="stats" id="stats"></div>
    <div id="articles"></div>
  </div>

  <script>
    let articles = [];

    async function init() {
      const res = await fetch('./website_data.json');
      const data = await res.json();
      articles = Object.values(data);
      renderArticles();
    }

    function renderArticles() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = articles;

      if (search) {
        filtered = filtered.filter(a =>
          (a.title || '').toLowerCase().includes(search) ||
          (a.summary || '').toLowerCase().includes(search) ||
          (a.tags || []).join(',').toLowerCase().includes(search) ||
          (a.quote || '').toLowerCase().includes(search)
        );
      }

      document.getElementById('stats').textContent = `共 ${filtered.length} 篇文章`;

      const container = document.getElementById('articles');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">没有找到匹配的文章</div>';
        return;
      }

      container.innerHTML = filtered.map(a => `
        <div class="article">
          <h3>${a.title || '无标题'}</h3>
          <div class="meta">第${a.week || '?'}周 · ${a.weekTitle || ''}</div>
          <div class="summary">${a.summary || '暂无摘要'}</div>
          ${(a.quote || '') ? `<div class="quote">"${a.quote}"</div>` : ''}
          <div class="tags">${(a.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', renderArticles);
    init();
  </script>
</body>
</html>
